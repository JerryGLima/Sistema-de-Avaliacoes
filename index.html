<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Avaliações</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .loader { border-top-color: #2563eb; animation: spinner 1.2s linear infinite; border-radius: 50%; }
        @keyframes spinner { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
        .btn-active { transition: all 0.15s ease; }
        .btn-active:active { transform: scale(0.95); }

        /* TOAST */
        #toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
        .toast{display:flex;align-items:center;gap:12px;background:#0f172a;color:white;padding:14px 20px;border-radius:16px;font-size:13px;font-weight:700;box-shadow:0 20px 60px rgba(0,0,0,0.3);pointer-events:all;animation:toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:360px}
        .toast.success{background:#059669}.toast.error{background:#dc2626}.toast.info{background:#2563eb}.toast.warning{background:#d97706}
        @keyframes toastIn{from{opacity:0;transform:translateX(60px) scale(0.9)}to{opacity:1;transform:translateX(0) scale(1)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}

        /* RICH EDITOR */
        .rich-editor{outline:none;border:1px solid #e2e8f0;border-radius:0 0 1rem 1rem;padding:.875rem 1rem;min-height:44px;transition:border-color .2s,box-shadow .2s}
        .rich-editor:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.1)}
        .rich-editor:empty:before{content:attr(data-placeholder);color:#94a3b8;pointer-events:none;display:block}

        /* TOOLBAR FORMATAÇÃO */
        .fmt-toolbar{display:flex;gap:3px;flex-wrap:wrap;padding:6px 8px;background:#f8fafc;border:1px solid #e2e8f0;border-bottom:none;border-radius:1rem 1rem 0 0;align-items:center}
        .fmt-btn{width:30px;height:30px;border:none;background:transparent;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#64748b;transition:all .15s;flex-shrink:0}
        .fmt-btn:hover{background:#e2e8f0;color:#0f172a}
        .fmt-sep{width:1px;height:20px;background:#e2e8f0;margin:0 3px;flex-shrink:0}

        /* PREVIEW */
        .preview-mode #app-screen{display:none!important}
        .preview-mode #print-view{display:block!important}

        /* A4 */
        .a4-sheet{
            width:210mm;
            background:white;
            font-family:Arial,Helvetica,sans-serif;
            font-size:11pt;
            line-height:1.45;
            color:#000;
            box-sizing:border-box;
            box-shadow:0 0 40px rgba(0,0,0,.35);
        }
        .a4-sheet *{box-sizing:border-box}
        .a4-header-zone{padding:15mm 15mm 0 15mm;width:100%}
        .a4-body{padding:8pt 15mm 15mm 15mm}
        .q-block{page-break-inside:avoid;break-inside:avoid}

        /* PRINT */
        @media print{
            *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
            body,html{margin:0;padding:0;background:white}
            #app-screen,#login-screen,#print-toolbar,#toast-container,#color-picker-popup{display:none!important}
            #print-view{display:block!important;position:static!important;background:white!important;overflow:visible!important;padding:0!important}
            #print-content{padding:0!important;margin:0!important;display:block!important}
            .a4-sheet{box-shadow:none!important;width:100%!important;margin:0!important}
            .q-block{page-break-inside:avoid;break-inside:avoid}
        }
    </style>
</head>

        <button onclick="applyColor('#dc2626')" class="w-8 h-8 bg-red-600 rounded-lg hover:ring-2 ring-offset-2 ring-red-400"></button>

<script>
// =============================================
// FIREBASE CONFIG
// =============================================
const firebaseConfig={apiKey:"AIzaSyDJvnHNvVJXyMQQhFRIKNaHEKVdqHKxLQE",authDomain:"manus-artifacts.firebaseapp.com",projectId:"manus-artifacts",storageBucket:"manus-artifacts.appspot.com",messagingSenderId:"1094046635988",appId:"1:1094046635988:web:d6c1c8f8c5c2e6a3b2c1d4e5"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();
const db=firebase.firestore();
const DB_COL='assessment-system';

// =============================================
// TOAST
// =============================================
function showToast(msg,type='info',duration=3000){
    const container=document.getElementById('toast-container');
    const toast=document.createElement('div');
    toast.className=`toast ${type}`;
    toast.innerHTML=`<span>${msg}</span>`;
    container.appendChild(toast);
    if(duration>0) setTimeout(()=>{
        toast.style.animation='toastOut 0.3s forwards';
        setTimeout(()=>toast.remove(),300);
    },duration);
}

// =============================================
// COLOR PICKER
// =============================================
let currentColorEditorId=null;
function showColorPicker(editorId,btn){
    currentColorEditorId=editorId;
    const picker=document.getElementById('color-picker-popup');
    const rect=btn.getBoundingClientRect();
    picker.style.left=(rect.left+window.scrollX)+'px';
    picker.style.top=(rect.bottom+window.scrollY+8)+'px';
    picker.style.display='block';
}
function applyColor(color){
    if(!currentColorEditorId)return;
    document.execCommand('foreColor',false,color);
    document.getElementById('color-picker-popup').style.display='none';
}
document.addEventListener('click',(e)=>{
    const picker=document.getElementById('color-picker-popup');
    if(!e.target.closest('[data-color-trigger]')&&!e.target.closest('#color-picker-popup')){
        picker.style.display='none';
    }
});
function initColorPicker(){}

// =============================================
// TOOLBAR
// =============================================
function makeToolbar(editorId){
    const tb=document.createElement('div');
    tb.className='fmt-toolbar';
    const btns=[
        {label:'<strong>B</strong>',cmd:'bold',title:'Negrito'},
        {label:'<em>I</em>',cmd:'italic',title:'Itálico'},
        {label:'<u>U</u>',cmd:'underline',title:'Sublinhado'}
    ];
    btns.forEach(b=>{
        const btn=document.createElement('button');
        btn.type='button';
        btn.className='fmt-btn';
        btn.title=b.title;
        btn.innerHTML=b.label;
        btn.onmousedown=(e)=>{e.preventDefault();document.execCommand(b.cmd,false,null);};
        tb.appendChild(btn);
    });
    // sep
    const s1=document.createElement('div'); s1.className='fmt-sep'; tb.appendChild(s1);
    // cor
    const cBtn=document.createElement('button');
    cBtn.type='button'; cBtn.className='fmt-btn'; cBtn.title='Cor do texto';
    cBtn.setAttribute('data-color-trigger','1');
    cBtn.innerHTML='<span style="font-size:13px;font-weight:900;color:#dc2626;text-decoration:underline;text-decoration-color:#dc2626">A</span>';
    cBtn.onmousedown=(e)=>{e.preventDefault();showColorPicker(editorId,cBtn);};
    tb.appendChild(cBtn);
    // sep
    const s2=document.createElement('div'); s2.className='fmt-sep'; tb.appendChild(s2);
    // limpar
    const clr=document.createElement('button');
    clr.type='button'; clr.className='fmt-btn'; clr.title='Limpar formatação';
    clr.innerHTML='<span style="font-size:10px;font-weight:700">✕ fmt</span>';
    clr.onmousedown=(e)=>{e.preventDefault();document.execCommand('removeFormat',false,null);};
    tb.appendChild(clr);
    return tb;
}

// =============================================
// ESTADO
// =============================================
let questions=[];
let headerData={id:null,imagem:null,titulo:''};
let cropState={questionId:null,optionId:null,startX:0,startY:0,isDragging:false};
let allAssessments=[];

// =============================================
// AUTH
// =============================================
document.getElementById('login-form').onsubmit=async(e)=>{
    e.preventDefault();
    const email=document.getElementById('login-email').value;
    const pass=document.getElementById('login-password').value;
    const err=document.getElementById('auth-error');
    const sp=document.getElementById('login-spinner');
    err.classList.add('hidden'); sp.classList.remove('hidden');
    try{await auth.signInWithEmailAndPassword(email,pass);}
    catch{err.innerText='E-mail ou senha incorretos.';err.classList.remove('hidden');sp.classList.add('hidden');}
};
auth.onAuthStateChanged(user=>{
    if(user){
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        document.getElementById('user-display').innerText=user.email?user.email.split('@')[0]:'Professor';
        loadSavedAssessments(); initColorPicker();
    }else{
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('app-screen').classList.add('hidden');
    }
    lucide.createIcons();
});
function handleLogout(){auth.signOut();showToast('Sessão encerrada','info');}

// =============================================
// QUESTÕES
// =============================================
function addQuestion(type){
    const q={
        id:Date.now().toString(), type,
        textoApoio:'', enunciado:'', imagem:null, imageWidth:50,

// CROP
// =============================================
function startCrop(qId,oId,input){
    const file=input.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=(e)=>{cropState.questionId=qId;cropState.optionId=oId;document.getElementById('img-to-crop').src=e.target.result;document.getElementById('cropper-modal').classList.remove('hidden');initCropInternal();};
    r.readAsDataURL(file);
}
function initCropInternal(){
    const img=document.getElementById('img-to-crop');
    const rect=document.getElementById('crop-rect');
    rect.classList.add('hidden');
    const cont=img.parentElement;
    cont.onmousedown=(e)=>{const b=img.getBoundingClientRect();cropState.startX=e.clientX-b.left;cropState.startY=e.clientY-b.top;cropState.isDragging=true;rect.style.cssText=`left:${cropState.startX}px;top:${cropState.startY}px;width:0;height:0`;rect.classList.remove('hidden');};
    cont.onmousemove=(e)=>{if(!cropState.isDragging)return;const b=img.getBoundingClientRect();const cx=e.clientX-b.left,cy=e.clientY-b.top;rect.style.width=Math.abs(cx-cropState.startX)+'px';rect.style.height=Math.abs(cy-cropState.startY)+'px';rect.style.left=Math.min(cx,cropState.startX)+'px';rect.style.top=Math.min(cy,cropState.startY)+'px';};
    cont.onmouseup=()=>cropState.isDragging=false;
}
function applyCrop(full){
    const img=document.getElementById('img-to-crop');
    const c=document.createElement('canvas');
    const ctx=c.getContext('2d');
    if(full){c.width=img.naturalWidth;c.height=img.naturalHeight;ctx.drawImage(img,0,0);}
    else{const rE=document.getElementById('crop-rect').getBoundingClientRect();const b=img.getBoundingClientRect();const sx=img.naturalWidth/b.width,sy=img.naturalHeight/b.height;c.width=rE.width*sx;c.height=rE.height*sy;ctx.drawImage(img,(rE.left-b.left)*sx,(rE.top-b.top)*sy,rE.width*sx,rE.height*sy,0,0,c.width,c.height);}
    const data=c.toDataURL('image/jpeg',0.88);
    const q=questions.find(qu=>qu.id===cropState.questionId);
    if(cropState.optionId)q.opcoes.find(o=>o.id.toString()===cropState.optionId.toString()).image=data;
    else q.imagem=data;
    closeCropper();renderQuestions();
}
function closeCropper(){document.getElementById('cropper-modal').classList.add('hidden');}
function removeQuestionImage(qId){questions.find(q=>q.id===qId).imagem=null;renderQuestions();}
function removeOptImage(qId,oId){questions.find(q=>q.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).image=null;renderQuestions();}

function uploadHeader(input){

}

async function saveToCloud(){
    if(!auth.currentUser)return;
    const title=document.getElementById('assessment-title').value.trim();
    if(!title){showToast('Digite um título','warning');return;}
    headerData.titulo=title;
    const btn=document.getElementById('btn-save');
    btn.disabled=true;
    
    // Mostrar ícone de carregamento
    btn.innerHTML=`<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full loader" style="display:inline-block"></div><span class="hidden sm:inline ml-1">Salvando...</span>`;
    
    const docId=headerData.id||Date.now().toString();
    try{
        await db.collection('artifacts').doc(DB_COL).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').doc(docId).set({id:docId,headerData,questions,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

        btn.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg><span class="hidden sm:inline">Salvar</span>`;
        btn.disabled=false;
    }catch(e){
        console.error(e);
        showToast('Erro ao salvar. Tente novamente.','error');
        btn.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg><span class="hidden sm:inline">Salvar</span>`;
        btn.disabled=false;
    }
}

function toggleSavedModal(){const m=document.getElementById('saved-modal');const h=m.classList.contains('hidden');m.classList.toggle('hidden');if(h)loadSavedAssessments();}
async function loadSavedAssessments(){
    if(!auth.currentUser)return;
    const list=document.getElementById('saved-list');
    list.innerHTML='<div class="flex justify-center py-8"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent loader"></div></div>';
    try{
        const snap=await db.collection('artifacts').doc(DB_COL).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').orderBy('updatedAt','desc').get();
        allAssessments=[];list.innerHTML='';
        if(snap.empty){list.innerHTML='<div class="text-center py-10 text-slate-400"><i data-lucide="inbox" class="w-10 h-10 mx-auto mb-3 opacity-50"></i><p class="font-bold text-sm">Nenhuma prova salva ainda</p></div>';lucide.createIcons();return;}
        document.getElementById('saved-count').innerText=`${snap.size} prova${snap.size>1?'s':''} salva${snap.size>1?'s':''}`;
        snap.forEach(doc=>{
            const data=doc.data();
            const idx=allAssessments.length;
            allAssessments.push(data);
            const isA=data.id===headerData.id;
            const dt=data.updatedAt?.toDate?data.updatedAt.toDate().toLocaleString('pt-BR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
            const item=document.createElement('div');
            item.className=`p-5 rounded-2xl border transition-all ${isA?'bg-blue-50 border-blue-200':'bg-slate-50 border-slate-100 hover:bg-white hover:border-slate-200 hover:shadow-md'}`;
            item.innerHTML=`<div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0 cursor-pointer" onclick="loadAssessmentByIndex(${idx})">
                    <h4 class="font-black text-slate-900 text-base uppercase truncate">${data.headerData.titulo||'Sem Título'}</h4>
                    <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                        <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-black uppercase">${data.questions.length} questões</span>
                        ${dt?`<span class="text-[10px] text-slate-400">${dt}</span>`:''}
                        ${isA?'<span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-black uppercase">Aberta</span>':''}
                    </div>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button onclick="loadAssessmentByIndex(${idx})" class="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 active:scale-90"><i data-lucide="folder-open" class="w-4 h-4"></i></button>
                    <button onclick="deleteAssessment('${data.id}',${idx});event.stopPropagation()" class="p-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white active:scale-90"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>`;
            list.appendChild(item);
        });
    }catch{list.innerHTML='<div class="text-center py-8 text-red-400 font-bold text-sm">Erro ao carregar</div>';}
    lucide.createIcons();
}
function loadAssessmentByIndex(idx){
    const data=allAssessments[idx];
    headerData={...data.headerData};
    questions=data.questions.map(q=>({...q,opcoes:q.opcoes?q.opcoes.map(o=>({...o})):[]}));
    document.getElementById('assessment-title').value=headerData.titulo||'';
    if(headerData.imagem){document.getElementById('header-upload-container').classList.add('hidden');document.getElementById('header-preview-container').classList.remove('hidden');document.getElementById('header-img-preview').src=headerData.imagem;}
    else removeHeader();
    renderQuestions();toggleSavedModal();
    showToast(`"${headerData.titulo}" carregada`,'info');
}
async function deleteAssessment(docId,idx){
    if(!confirm('Excluir esta prova permanentemente?'))return;
    try{await db.collection('artifacts').doc(DB_COL).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').doc(docId).delete();showToast('Prova excluída','warning');loadSavedAssessments();}
    catch{showToast('Erro ao excluir','error');}
}

function buildQuestaoHTML(q,index){
    let h=`<div class="q-block" style="margin-bottom:11pt;page-break-inside:avoid;break-inside:avoid;">`;
    if(q.textoApoio&&q.textoApoio.replace(/<[^>]*>/g,'').trim()){
        h+=`<div style="background:#f2f2f2;border-left:3pt solid #444;padding:5pt 8pt;margin-bottom:5pt;font-size:10pt;font-style:italic;">${q.textoApoio}</div>`;
    }
    h+=`<div style="display:flex;gap:5pt;margin-bottom:3pt;align-items:flex-start;"><strong style="white-space:nowrap;font-size:11pt;min-width:16pt;">${index+1}.</strong><div style="flex:1;font-weight:600;">${q.enunciado||'...'}</div></div>`;
    if(q.imagem)h+=`<div style="text-align:center;margin:5pt 0;"><img src="${q.imagem}" style="width:${q.imageWidth}%;max-width:100%;display:inline-block;"></div>`;
    if(q.type==='text'){
        const n=Math.max(1,parseInt(q.linhas)||4);
        h+=`<div style="margin-top:4pt;">`;
        for(let i=0;i<n;i++)h+=`<div style="border-bottom:0.5pt solid #000;height:16pt;margin-bottom:3pt;"></div>`;
        h+=`</div>`;
    }
    if(['multiple-choice','true-false','discursive-list'].includes(q.type)){
        h+=`<div style="margin-top:3pt;margin-left:12pt;">`;
        q.opcoes.forEach((opt,i)=>{
            const l=String.fromCharCode(97+i);
            const p=q.type==='true-false'?`${l}) (     )`:(`${l})`);
            h+=`<div style="display:flex;align-items:flex-start;gap:4pt;margin-bottom:${q.type==='discursive-list'?'1pt':'3pt'};">
                <span style="font-weight:700;white-space:nowrap;">${p}</span>
                <div style="flex:1;">${opt.type==='image'&&opt.image?`<img src="${opt.image}" style="max-height:50pt;width:auto;object-fit:contain;">`:opt.text||''}</div>
            </div>`;
            if(q.type==='discursive-list')h+=`<div style="border-bottom:0.5pt solid #ccc;height:16pt;width:100%;margin-bottom:3pt;"></div>`;
        });
        h+=`</div>`;
    }
    if(q.type==='matching'){
        h+=`<div style="margin-top:5pt;margin-left:12pt;">`;
        q.opcoes.forEach((opt,i)=>{
            const l=String.fromCharCode(97+i);
            h+=`<div style="display:flex;align-items:center;gap:8pt;margin-bottom:7pt;">
                <div style="flex:1;display:flex;align-items:center;gap:4pt;"><span style="font-weight:700;">${l})</span>
                ${opt.type==='image'&&opt.image?`<img src="${opt.image}" style="max-height:40pt;width:auto;border:0.5pt solid #ccc;">`:
                `<span style="border-bottom:1pt solid #000;flex:1;padding-bottom:2pt;">${opt.text||''}</span>`}</div>
                <div style="flex:1;display:flex;align-items:center;gap:4pt;">
                    <span style="width:9pt;height:9pt;border:1.5pt solid #000;border-radius:50%;display:inline-block;flex-shrink:0;"></span>
                </div>
            </div>`;
        });
        h+=`</div>`;
    }
    h+=`</div>`;
    return h;
}

// =============================================
function buildPageHTML(bodyContent, isFirst){
    const title=document.getElementById('assessment-title').value.trim();
    const headerImgHTML=headerData.imagem&&isFirst
        ?`<div style="width:100%;margin-bottom:6pt;"><img src="${headerData.imagem}" style="width:100%;display:block;max-height:38mm;object-fit:contain;"></div>`:'';
    const titleHTML=isFirst&&title
        ?`<h1 style="text-align:center;font-size:14pt;font-weight:900;text-transform:uppercase;margin:0 0 8pt 0;letter-spacing:.04em;padding-bottom:6pt;border-bottom:2pt solid #000;">${title}</h1>`:'';

    return `<div class="a4-sheet" style="width:210mm;background:white;font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.45;color:#000;box-sizing:border-box;">
        <div style="padding:15mm 15mm 0 15mm;">
            ${headerImgHTML}
            ${titleHTML}
        </div>
        <div style="padding:6pt 15mm 15mm 15mm;">
            ${bodyContent}
        </div>
    </div>`;
}

// =============================================
// PREVIEW — uma única sheet para tela e impressão
// Cabeçalho só na 1ª página. Para impressão, o browser
// usa as margens @page e pagina o conteúdo automaticamente.
// =============================================
function buildPreviewHTML(){
    const title=document.getElementById('assessment-title').value.trim();
    const headerImgHTML=headerData.imagem
        ?`<div style="width:100%;margin-bottom:8pt;"><img src="${headerData.imagem}" style="width:100%;display:block;max-height:40mm;object-fit:contain;"></div>`
        :'';
    const titleHTML=title
        ?`<h1 style="text-align:center;font-size:14pt;font-weight:900;text-transform:uppercase;margin:0 0 10pt 0;letter-spacing:.04em;padding-bottom:6pt;border-bottom:2pt solid #000;">${title}</h1>`
        :'';
    const questoesHTML=questions.map((q,i)=>buildQuestaoHTML(q,i)).join('');

    // Estrutura: uma única div A4 com tudo dentro.
    // Para tela: aparece como folha. Para impressão: browser pagina.
    return `<div class="a4-sheet" style="width:210mm;min-height:297mm;background:white;font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.45;color:#000;box-sizing:border-box;box-shadow:0 0 40px rgba(0,0,0,.35);padding:15mm;">
        ${headerImgHTML}
        ${titleHTML}
        ${questoesHTML}
    </div>`;
}

function enterPreviewMode(){
    document.getElementById('print-content').innerHTML=buildPreviewHTML();
    document.body.classList.add('preview-mode');
    window.scrollTo(0,0);
}
function exitPreviewMode(){document.body.classList.remove('preview-mode');}

// =============================================
// GERAR PDF - CORRIGIDO
// Cabeçalho somente na primeira página
// =============================================
async function generatePDF(){
    const rawTitle=document.getElementById('assessment-title').value.trim()||'avaliacao';
    const filename=rawTitle.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'')+'.pdf';

    showToast('Gerando PDF… por favor aguarde','info',10000);

    // 1) Criar wrapper oculto fora da tela
    const wrapper=document.createElement('div');
    wrapper.style.cssText='position:fixed;left:-9999px;top:0;z-index:-100;pointer-events:none;';
    document.body.appendChild(wrapper);

    // 2) Escala para alta qualidade
    const SCALE=2;
    const A4_W_PX=Math.round(210/25.4*96);
    const A4_H_PX=Math.round(297/25.4*96);

    // 3) Construir div única do conteúdo (sem cabeçalho na primeira página)
    const contentDiv=document.createElement('div');
    contentDiv.style.cssText=`width:${A4_W_PX}px;font-family:Arial,Helvetica,sans-serif;font-size:14.7px;line-height:1.45;color:#000;background:white;box-sizing:border-box;padding:0 ${Math.round(15/25.4*96)}px;`;
    
    // Cabeçalho + Título somente no início do conteúdo
    const title=document.getElementById('assessment-title').value.trim();
    if(headerData.imagem){
        const hImg=document.createElement('img');
        hImg.src=headerData.imagem;
        hImg.style.cssText='width:100%;display:block;max-height:180px;object-fit:contain;margin-bottom:8px;';
        contentDiv.appendChild(hImg);
    }
    if(title){
        const th=document.createElement('h1');
        th.style.cssText='text-align:center;font-size:18.7px;font-weight:900;text-transform:uppercase;margin:0 0 10px 0;letter-spacing:.04em;padding-bottom:8px;border-bottom:2px solid #000;';
        th.textContent=title;
        contentDiv.appendChild(th);
    }
    
    // Questões
    questions.forEach((q,i)=>{
        const qDiv=document.createElement('div');
        qDiv.innerHTML=buildQuestaoHTML(q,i);
        contentDiv.appendChild(qDiv.firstElementChild);
    });
    wrapper.appendChild(contentDiv);
    await new Promise(r=>setTimeout(r,300));

    // 4) Capturar conteúdo completo num canvas
    const contentCanvas=await html2canvas(contentDiv,{
        scale:SCALE, useCORS:true, allowTaint:true,
        scrollX:0, scrollY:0,
        width:A4_W_PX, windowWidth:A4_W_PX,
        backgroundColor:'#ffffff',
        logging:false
    });

    // 5) Montar PDF página por página
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    const MARGIN_MM=15;
    const CONTENT_W_MM=210-(2*MARGIN_MM);

    // Converter px canvas → mm
    const pxToMm=(px)=>px/(SCALE*96/25.4);
    const contentTotalH=pxToMm(contentCanvas.height);

    // Área útil por página em mm
    const usableH_MM=297-(2*MARGIN_MM);

    // Escala: largura do contentCanvas → CONTENT_W_MM
    const contentScaleMM=CONTENT_W_MM/pxToMm(contentCanvas.width);
    const totalContentMM=contentTotalH*contentScaleMM;

    let yContentMM=0;
    let pageIndex=0;

    while(yContentMM<totalContentMM){
        if(pageIndex>0) pdf.addPage();

        let sliceStartMM=yContentMM;
        let availableMM=usableH_MM;

        // Calcular slice do contentCanvas em pixels
        const mmToPxCanvas=(mm)=>mm*contentCanvas.height/totalContentMM;
        const pxStart=Math.floor(mmToPxCanvas(sliceStartMM));
        const pxH=Math.min(Math.ceil(mmToPxCanvas(availableMM)), contentCanvas.height-pxStart);

        if(pxH<=0) break;

        // Criar slice canvas
        const slice=document.createElement('canvas');
        slice.width=contentCanvas.width;
        slice.height=pxH;
        slice.getContext('2d').drawImage(contentCanvas,0,pxStart,contentCanvas.width,pxH,0,0,contentCanvas.width,pxH);

        const sliceImg=slice.toDataURL('image/jpeg',0.95);
        const sliceHmm=pxToMm(pxH)*contentScaleMM;

        pdf.addImage(sliceImg,'JPEG',MARGIN_MM,MARGIN_MM,CONTENT_W_MM,sliceHmm);

        yContentMM+=availableMM;
        pageIndex++;
        if(pageIndex>50) break;
    }

    document.body.removeChild(wrapper);

    // Tentar salvar
    try{
        pdf.save(filename);
        showToast('PDF gerado com sucesso!','success');
    }catch(e){
        console.error(e);
        showToast('PDF gerado! Verifique seus downloads.','success');
    }
}

// =============================================
// IMPRIMIR
// =============================================
function printDirect(){enterPreviewMode();setTimeout(()=>{window.print();exitPreviewMode();},600);}

// =============================================
// HELPERS
// =============================================
function addOption(qId){const q=questions.find(qu=>qu.id===qId);q.opcoes.push({id:Date.now().toString(),text:'',image:null,matchText:'',type:'text'});renderQuestions();}
function updateImageWidth(qId,val){
    const q=questions.find(qu=>qu.id===qId);q.imageWidth=parseInt(val);
    const z=document.getElementById(`img-zone-${qId}`);if(z){z.innerHTML=buildImgZone(q);lucide.createIcons();}
}
function adjustLines(qId,d){const q=questions.find(qu=>qu.id===qId);q.linhas=Math.max(1,Math.min(20,(parseInt(q.linhas)||4)+d));const el=document.getElementById(`lines-d-${qId}`);if(el)el.textContent=q.linhas;}
function setOptType(qId,oId,type){questions.find(qu=>qu.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).type=type;renderQuestions();}
function updateOptText(qId,oId,val){questions.find(qu=>qu.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).text=val;}
function updateOptMatch(qId,oId,val){questions.find(qu=>qu.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).matchText=val;}
function removeOption(qId,oId){const q=questions.find(qu=>qu.id===qId);if(q.opcoes.length<=1){showToast('Mínimo de 1 opção','warning');return;}q.opcoes=q.opcoes.filter(o=>o.id.toString()!==oId.toString());renderQuestions();}
</script>
