<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Avaliações</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .loader { border-top-color: #2563eb; animation: spinner 1.2s linear infinite; border-radius: 50%; }
        @keyframes spinner { 0%{transform:rotate(0deg)}100%{transform:rotate(360deg)} }
        .btn-active { transition: all 0.15s ease; }
        .btn-active:active { transform: scale(0.95); }

        /* TOAST */
        #toast-container{position:fixed;top:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none}
        .toast{display:flex;align-items:center;gap:12px;background:#0f172a;color:white;padding:14px 20px;border-radius:16px;font-size:13px;font-weight:700;box-shadow:0 20px 60px rgba(0,0,0,0.3);pointer-events:all;animation:toastIn 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:360px}
        .toast.success{background:#059669}.toast.error{background:#dc2626}.toast.info{background:#2563eb}.toast.warning{background:#d97706}
        @keyframes toastIn{from{opacity:0;transform:translateX(60px) scale(0.9)}to{opacity:1;transform:translateX(0) scale(1)}}
        @keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(60px)}}

        /* RICH EDITOR */
        .rich-editor{outline:none;border:1px solid #e2e8f0;border-radius:0 0 1rem 1rem;padding:.875rem 1rem;min-height:44px;transition:border-color .2s,box-shadow .2s; background:white;}
        .rich-editor:focus{border-color:#3b82f6;box-shadow:0 0 0 4px rgba(59,130,246,.1)}
        .rich-editor:empty:before{content:attr(data-placeholder);color:#94a3b8;pointer-events:none;display:block}

        /* TOOLBAR FORMATAÇÃO */
        .fmt-toolbar{display:flex;gap:3px;flex-wrap:wrap;padding:6px 8px;background:#f8fafc;border:1px solid #e2e8f0;border-bottom:none;border-radius:1rem 1rem 0 0;align-items:center}
        .fmt-btn{width:30px;height:30px;border:none;background:transparent;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#64748b;transition:all .15s;flex-shrink:0}
        .fmt-btn:hover{background:#e2e8f0;color:#0f172a}
        .fmt-sep{width:1px;height:20px;background:#e2e8f0;margin:0 3px;flex-shrink:0}

        /* A4 SHEET RIGIDA */
        .a4-sheet{
            width: 210mm;
            height: 297mm;
            background: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 11pt;
            line-height: 1.45;
            color: #000;
            box-sizing: border-box;
            box-shadow: 0 10px 40px rgba(0,0,0,.35);
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .a4-sheet *{box-sizing:border-box}
        .q-block{page-break-inside:avoid;break-inside:avoid}

        /* =========================================
           MOBILE PREVIEW FIXES (ZOOM & PAN LIVRE)
           ========================================= */
        body { overflow-x: hidden; } 
        
        body.preview-mode { 
            overflow: auto !important; 
            background: #18181b; 
        }
        .preview-mode #app-screen { display: none !important; }
        .preview-mode #print-view {
            display: block !important;
            position: absolute !important;
            top: 0; left: 0; right: 0;
            min-height: 100vh;
            z-index: 100;
            overflow: visible !important;
        }
        #print-toolbar {
            position: fixed; 
            top: 20px; left: 0; right: 0;
            z-index: 1000;
        }
        #print-content {
            padding: 100px 20px 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: flex-start; 
            min-width: max-content; 
        }
        @media (min-width: 850px) {
            #print-content {
                align-items: center; 
                min-width: 100%;
            }
        }

        /* AJUSTE CROPPER NO MOBILE */
        .cropper-view-box, .cropper-face { border-radius: 8px; }
        .cropper-line { background-color: #3b82f6; opacity: 0.5; }
        .cropper-point { background-color: #3b82f6; }

        /* PRINT */
        @media print{
            @page { size: A4 portrait; margin: 0; }
            *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
            body,html{margin:0;padding:0;background:white}
            #app-screen,#login-screen,#print-toolbar,#toast-container,#color-picker-popup{display:none!important}
            #print-view{display:block!important;position:static!important;background:white!important;overflow:visible!important;padding:0!important}
            #print-content{padding:0!important;margin:0!important;display:block!important}
            
            .a4-sheet{
                box-shadow:none!important;
                margin:0!important;
                page-break-after: always;
            }
            .a4-sheet:last-child { page-break-after: auto; }
        }
    </style>
</head>

<script>
// =============================================
// FIREBASE
// =============================================
const firebaseConfig = {
  apiKey: "AIzaSyAG4Ls3Tl7afRQtA4IB1svLaJvSCSVvtTI",
  authDomain: "sistema-de-avaliacoes-8ccd0.firebaseapp.com",
  projectId: "sistema-de-avaliacoes-8ccd0",
  storageBucket: "sistema-de-avaliacoes-8ccd0.firebasestorage.app",
  messagingSenderId: "382455894538",
  appId: "1:382455894538:web:0574f60c1402999c3d05f3"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const DB_COL = "sistema-avaliacoes-v5";

// =============================================
// TOAST
// =============================================
function showToast(msg, type='success', dur=3500) {
    const icons={success:'check-circle',error:'alert-circle',info:'info',warning:'alert-triangle'};
    const cont=document.getElementById('toast-container');
    const t=document.createElement('div');
    t.className=`toast ${type}`;
    t.innerHTML=`<i data-lucide="${icons[type]}" style="width:18px;height:18px;flex-shrink:0"></i><span>${msg}</span>`;
    cont.appendChild(t);
    lucide.createIcons({nodes:[t]});
    setTimeout(()=>{t.style.animation='toastOut .35s ease forwards';setTimeout(()=>t.remove(),350);},dur);
}

// =============================================
// COLOR PICKER
// =============================================
const PALETTE=['#000000','#1e293b','#334155','#64748b','#94a3b8','#cbd5e1','#ffffff',
    '#dc2626','#ea580c','#d97706','#16a34a','#0284c7','#7c3aed','#db2777',
    '#ef4444','#f97316','#eab308','#22c55e','#3b82f6','#8b5cf6','#ec4899',
    '#fca5a5','#fdba74','#fde68a','#86efac','#93c5fd','#c4b5fd','#f9a8d4'];
let _colorEditorId=null;

function initColorPicker(){
    const sw=document.getElementById('color-swatches');
    PALETTE.forEach(c=>{
        const b=document.createElement('button');
        b.style.cssText=`width:22px;height:22px;border-radius:50%;background:${c};border:2px solid ${c==='#ffffff'?'#e2e8f0':c};cursor:pointer;transition:transform .15s`;
        b.title=c;
        b.onmouseenter=()=>b.style.transform='scale(1.25)';
        b.onmouseleave=()=>b.style.transform='scale(1)';
        b.onmousedown=(e)=>{e.preventDefault();applyColor(c);};
        sw.appendChild(b);
    });
    document.getElementById('custom-color-input').oninput=(e)=>applyColor(e.target.value);
    document.addEventListener('mousedown',(e)=>{
        if(!document.getElementById('color-picker-popup').contains(e.target)&&!e.target.closest('[data-color-trigger]'))
            document.getElementById('color-picker-popup').classList.add('hidden');
    });
}
function showColorPicker(editorId,trigger){
    _colorEditorId=editorId;
    const popup=document.getElementById('color-picker-popup');
    popup.classList.remove('hidden');
    const r=trigger.getBoundingClientRect();
    const top=r.bottom+8;
    const left=Math.max(8,Math.min(r.left,window.innerWidth-228));
    popup.style.top=top+'px'; popup.style.left=left+'px';
}
function applyColor(c){
    if(!_colorEditorId)return;
    const el=document.getElementById(_colorEditorId);
    if(el){el.focus();document.execCommand('foreColor',false,c);}
    document.getElementById('color-picker-popup').classList.add('hidden');
}

// =============================================
// TOOLBAR DE FORMATAÇÃO
// =============================================
function makeToolbar(editorId){
    const tb=document.createElement('div');
    tb.className='fmt-toolbar';
    const buttons=[
        {cmd:'bold',label:'<b>N</b>',title:'Negrito'},
        {cmd:'italic',label:'<i>I</i>',title:'Itálico'},
        {cmd:'underline',label:'<u>S</u>',title:'Sublinhado'},
        {cmd:'strikeThrough',label:'<s style="text-decoration:line-through">R</s>',title:'Riscado'},
    ];

// =============================================
// CROP COM CROPPER.JS
// =============================================
function startCrop(qId, oId, input){
    const file = input.files[0];
    if(!file) return;
    const r = new FileReader();
    r.onload = (e) => {
        cropState.questionId = qId;
        cropState.optionId = oId;
        const img = document.getElementById('img-to-crop');
        
        if(cropperInstance) {
            cropperInstance.destroy();
            cropperInstance = null;
        }

        img.onload = () => {
            document.getElementById('cropper-modal').classList.remove('hidden');
            
            cropperInstance = new Cropper(img, {
                viewMode: 1, 
                dragMode: 'move', 
                autoCropArea: 0.8,
                restore: false,
                guides: true, 
                center: true,
                highlight: false,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: false,
            });
        };
        img.src = e.target.result;
    };
    r.readAsDataURL(file);
    input.value = '';
}

function applyCrop(full){
    if(!cropperInstance) return;

    let canvas;
    if(full) {
        cropperInstance.clear();
    }
    
    canvas = cropperInstance.getCroppedCanvas({
        fillColor: '#ffffff',
        imageSmoothingEnabled: true,
        imageSmoothingQuality: 'high',
    });

    if(!canvas) { closeCropper(); return; }

    const MAX_DIM = 1000; 
    let targetW = canvas.width;
    let targetH = canvas.height;

    if(targetW > MAX_DIM || targetH > MAX_DIM) {
        const ratio = Math.min(MAX_DIM/targetW, MAX_DIM/targetH);
        targetW *= ratio; 
        targetH *= ratio;
    }

    const finalCanvas = document.createElement('canvas');
    finalCanvas.width = targetW;
    finalCanvas.height = targetH;
    const ctx = finalCanvas.getContext('2d');
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0, 0, targetW, targetH);
    ctx.drawImage(canvas, 0, 0, targetW, targetH);
    
    const data = finalCanvas.toDataURL('image/jpeg', 0.90); 
    
    const q = questions.find(qu=>qu.id===cropState.questionId);
    if(cropState.optionId) {
        q.opcoes.find(o=>o.id.toString()===cropState.optionId.toString()).image=data;
    } else {
        q.imagem=data;
    }
    
    closeCropper();
    renderQuestions();
}

function closeCropper(){
    document.getElementById('cropper-modal').classList.add('hidden');
    if(cropperInstance) {
        cropperInstance.destroy();
        cropperInstance = null;
    }
    document.getElementById('img-to-crop').src = '';
}

function removeQuestionImage(qId){questions.find(q=>q.id===qId).imagem=null;renderQuestions();}
function removeOptImage(qId,oId){questions.find(q=>q.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).image=null;renderQuestions();}

// CABEÇALHO 
// =============================================
function uploadHeader(input){
    const file=input.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=(e)=>{
        const img = new Image();
        img.onload = () => {
            const c = document.createElement('canvas');
            const MAX_W = 1200; 
            let w = img.width, h = img.height;
            if(w > MAX_W) { h *= MAX_W/w; w = MAX_W; }
            
            c.width = w; c.height = h;
            const ctx = c.getContext('2d');
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, w, h);
            ctx.drawImage(img, 0, 0, w, h);
            
            headerData.imagem = c.toDataURL('image/jpeg', 0.90);
            document.getElementById('header-upload-container').classList.add('hidden');
            document.getElementById('header-preview-container').classList.remove('hidden');
            document.getElementById('header-img-preview').src = headerData.imagem;
            showToast('Cabeçalho carregado!','success');
        };
        img.src = e.target.result;
    };
    r.readAsDataURL(file);
}
function removeHeader(){headerData.imagem=null;document.getElementById('header-upload-container').classList.remove('hidden');document.getElementById('header-preview-container').classList.add('hidden');}

function captureEditorContents(){
    questions.forEach(q=>{
        const apoio=document.getElementById(`apoio-${q.id}`);
        const enun=document.getElementById(`enunciado-${q.id}`);
        if(apoio) q.textoApoio=apoio.innerHTML;
        if(enun)  q.enunciado=enun.innerHTML;
        
        if(q.type === 'fill-in-the-blanks' && q.opcoes) {

                if(lac) {
                    opt.text = lac.innerHTML;
                }
            });
        }
    });
}

// SALVAR BLINDADO COM "BALANÇA DIGITAL"
// =============================================
async function saveToCloud(){
    if(!auth.currentUser)return;
    const title=document.getElementById('assessment-title').value.trim();
    if(!title){showToast('Digite um título para a prova','warning');return;}
    captureEditorContents();
    headerData.titulo=title;
    const btn=document.getElementById('btn-save');
    
    btn.disabled=true;
    btn.innerHTML=`<div class="w-4 h-4 border-2 border-white border-t-transparent rounded-full loader" style="display:inline-block"></div><span class="hidden sm:inline ml-1">A guardar...</span>`;
    const docId=headerData.id||Date.now().toString();
    
    try{
        const payloadObj = {id:docId, headerData, questions};
        const payloadString = JSON.stringify(payloadObj);
        
        const sizeMB = new Blob([payloadString]).size / (1024 * 1024);
        if(sizeMB >= 0.9) {
            showToast(`Erro: A prova tem ${sizeMB.toFixed(2)} MB. Exclua imagens antigas.`, 'error', 6000);
            throw new Error('PAYLOAD_TOO_LARGE');
        }

        const payload = JSON.parse(payloadString);
        payload.updatedAt = firebase.firestore.FieldValue.serverTimestamp();

        const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('TIMEOUT')), 15000));
        
        await Promise.race([
            db.collection('artifacts').doc(DB_COL).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').doc(docId).set(payload),
            timeout
        ]);
        
        headerData.id=docId;
        localStorage.setItem('last_open_assessment_id', docId);
        btn.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg><span class="hidden sm:inline ml-1">Guardado!</span>`;
        btn.style.background='#065f46';
        showToast('✓ Prova guardada com sucesso!','success');
        
        setTimeout(()=>{
            btn.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg><span class="hidden sm:inline ml-1">Guardar</span>`;
            btn.style.background='';
            btn.disabled=false;
        },2000);

    }catch(e){
        console.error(e);
        if(e.message === 'TIMEOUT') {
            showToast('Tempo esgotado. A internet falhou.', 'error');
        } else if (e.message !== 'PAYLOAD_TOO_LARGE') {
            showToast('Erro ao guardar no servidor. Verifique a internet.', 'error');
        }
        btn.innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg><span class="hidden sm:inline ml-1">Guardar</span>`;
        btn.disabled=false;
    }
}

// HISTÓRICO COM CORREÇÃO DE CORRIDA E ABERTURA AUTO

function toggleSavedModal(){
    const m=document.getElementById('saved-modal');
    const h=m.classList.contains('hidden');
    m.classList.toggle('hidden');
    if(h) loadSavedAssessments(null, false);
}

async function loadSavedAssessments(uid = null, autoOpen = false){
    const currentUid = uid || (auth.currentUser ? auth.currentUser.uid : null);
    if(!currentUid) return; 
    
    const list=document.getElementById('saved-list');
    list.innerHTML='<div class="flex justify-center py-8"><div class="w-8 h-8 border-4 border-blue-600 border-t-transparent loader"></div></div>';
    
    try{
        const snap=await db.collection('artifacts').doc(DB_COL).collection('users').doc(currentUid).collection('avaliacoes').orderBy('updatedAt','desc').get();
        allAssessments=[];list.innerHTML='';
        
        if(snap.empty){
            list.innerHTML='<div class="text-center py-10 text-slate-400"><i data-lucide="inbox" class="w-10 h-10 mx-auto mb-3 opacity-50"></i><p class="font-bold text-sm">Nenhuma prova guardada ainda</p></div>';
            lucide.createIcons();
            return;
        }
        
        document.getElementById('saved-count').innerText=`${snap.size} prova${snap.size>1?'s':''} guardada${snap.size>1?'s':''}`;
        
        snap.forEach(doc=>{
            const data=doc.data();
            const idx=allAssessments.length;
            allAssessments.push(data);
            const isA=data.id===headerData.id;
            const dt=data.updatedAt?.toDate?data.updatedAt.toDate().toLocaleString('pt-BR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}):'';
            const item=document.createElement('div');
            item.className=`p-5 rounded-2xl border transition-all ${isA?'bg-blue-50 border-blue-200':'bg-slate-50 border-slate-100 hover:bg-white hover:border-slate-200 hover:shadow-md'}`;
            item.innerHTML=`<div class="flex items-start justify-between gap-3">
                <div class="flex-1 min-w-0 cursor-pointer" onclick="loadAssessmentByIndex(${idx})">
                    <h4 class="font-black text-slate-900 text-base uppercase truncate">${data.headerData.titulo||'Sem Título'}</h4>
                    <div class="flex items-center gap-2 mt-1.5 flex-wrap">
                        <span class="text-[10px] bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full font-black uppercase">${data.questions.length} questões</span>
                        ${dt?`<span class="text-[10px] text-slate-400">${dt}</span>`:''}
                        ${isA?'<span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-black uppercase">Aberta</span>':''}
                    </div>
                </div>
                <div class="flex gap-2 shrink-0">
                    <button onclick="loadAssessmentByIndex(${idx})" class="p-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 active:scale-90"><i data-lucide="folder-open" class="w-4 h-4"></i></button>
                    <button onclick="deleteAssessment('${data.id}',${idx});event.stopPropagation()" class="p-2 bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white active:scale-90"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            </div>`;
            list.appendChild(item);
        });

        if(autoOpen && allAssessments.length > 0) {
            const lastId = localStorage.getItem('last_open_assessment_id');
            const idx = lastId ? allAssessments.findIndex(a => a.id === lastId) : -1;
            loadAssessmentByIndex(idx >= 0 ? idx : 0, true); 
        }

    }catch{list.innerHTML='<div class="text-center py-8 text-red-400 font-bold text-sm">Erro ao carregar</div>';}
    lucide.createIcons();
}
function loadAssessmentByIndex(idx, silent = false){
    const data=allAssessments[idx];
    if(!data) return;
    headerData={...data.headerData};
    questions=data.questions.map(q=>({...q,opcoes:q.opcoes?q.opcoes.map(o=>({...o})):[]}));
    document.getElementById('assessment-title').value=headerData.titulo||'';
    if(headerData.imagem){document.getElementById('header-upload-container').classList.add('hidden');document.getElementById('header-preview-container').classList.remove('hidden');document.getElementById('header-img-preview').src=headerData.imagem;}
    else removeHeader();
    renderQuestions();
    localStorage.setItem('last_open_assessment_id', headerData.id || '');
    document.getElementById('saved-modal').classList.add('hidden');
    if(!silent) showToast(`"${headerData.titulo}" carregada`,'info');
}
async function deleteAssessment(docId,idx){
    if(!confirm('Excluir esta prova permanentemente?'))return;
    try{
        await db.collection('artifacts').doc(DB_COL).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').doc(docId).delete();
        showToast('Prova excluída','warning');
        loadSavedAssessments(null, false);
    }
    catch{showToast('Erro ao excluir','error');}
}

// =============================================
// BUILD HTML DA QUESTÃO (ALINHAMENTO BLINDADO ABSOLUTO)
// =============================================
function buildQuestaoHTML(q,index){
    let h=`<div class="q-block" style="margin-bottom:28pt;page-break-inside:avoid;break-inside:avoid;width:100%;">`;
    
    // BLOCO EXCLUSIVO DA NOVA QUESTÃO: COMPLETAR LACUNAS
    if(q.type === 'fill-in-the-blanks') {
        h+=`<div style="display:flex;gap:5pt;margin-bottom:8pt;align-items:flex-start;"><strong style="white-space:nowrap;font-size:11pt;min-width:16pt;">${index+1}.</strong><div style="flex:1;font-weight:600;line-height:1.45;">${q.enunciado||'...'}</div></div>`;
        
        const hasValidImg = q.imagem && q.imagem.length > 30;
        if(hasValidImg)h+=`<div style="text-align:center;margin:5pt 0;"><img src="${q.imagem}" style="width:${q.imageWidth}%;max-width:100%;display:inline-block;" crossorigin="anonymous"></div>`;
        
        if(q.textoApoio&&q.textoApoio.replace(/<[^>]*>/g,'').trim()){
            h+=`<div style="text-align:center; margin:10pt 0 15pt 0;"><div style="display:inline-block; border:1.5pt solid #888; border-radius:15pt; padding:6pt 20pt; font-size:11pt; font-weight:600;">${q.textoApoio}</div></div>`;
        }
        
        if (q.opcoes && q.opcoes.length === 1) {
            const lacunasText = q.opcoes[0].text;
            if(lacunasText && lacunasText.replace(/<[^>]*>/g,'').trim()) {
                 h+=`<div style="line-height:2; font-size:11pt; text-align:justify; margin-top:5pt;">${lacunasText}</div>`;
            }
        } else if (q.opcoes && q.opcoes.length > 1) {
            h += `<div style="margin-top:5pt;">`;
            q.opcoes.forEach((opt, i) => {
                const l = String.fromCharCode(97+i); 
                if(opt.text && opt.text.replace(/<[^>]*>/g,'').trim()) {
                    h += `<div style="position:relative; padding-left:20pt; margin-bottom:8pt; page-break-inside:avoid; min-height:16pt;">
                            <div style="position:absolute; left:0; top:0; width:14pt; text-align:right; font-weight:700; font-size:11pt; line-height:1.45;">${l})</div>
                            <div style="font-size:11pt; line-height:2; text-align:justify;">${opt.text}</div>
                          </div>`;
                }
            });
            h += `</div>`;
        }
    } 
    // BLOCO DAS OUTRAS QUESTÕES
    else {
        if(q.textoApoio&&q.textoApoio.replace(/<[^>]*>/g,'').trim()){
            h+=`<div style="background:#f2f2f2;border-left:3pt solid #444;padding:5pt 8pt;margin-bottom:5pt;font-size:10pt;font-style:italic;">${q.textoApoio}</div>`;
        }
        h+=`<div style="display:flex;gap:5pt;margin-bottom:3pt;align-items:flex-start;"><strong style="white-space:nowrap;font-size:11pt;min-width:16pt;">${index+1}.</strong><div style="flex:1;font-weight:600;">${q.enunciado||'...'}</div></div>`;
        
        const hasValidImg = q.imagem && q.imagem.length > 30;
        if(hasValidImg)h+=`<div style="text-align:center;margin:5pt 0;"><img src="${q.imagem}" style="width:${q.imageWidth}%;max-width:100%;display:inline-block;" crossorigin="anonymous"></div>`;
        
        if(q.type==='text'){
            const n=Math.max(1,parseInt(q.linhas)||4);
            h+=`<div style="margin-top:4pt;">`;
            for(let i=0;i<n;i++)h+=`<div style="border-bottom:0.8pt solid #999;height:20pt;width:100%;"></div>`;
            h+=`</div>`;
        }
        if(['multiple-choice','true-false','discursive-list'].includes(q.type)){
            h+=`<div style="margin-top:3pt;margin-left:12pt;">`;
            q.opcoes.forEach((opt,i)=>{
                const l=String.fromCharCode(97+i);
                const optImgValid = opt.type==='image' && opt.image && opt.image.length > 30;
                
                if(q.type === 'multiple-choice' || q.type === 'true-false') {
                    // Estrutura blindada para o PDF: Posicionamento absoluto garante o alinhamento da caixa com a primeira linha do texto
                    h+=`<div style="position:relative; padding-left:36pt; margin-bottom:6pt; page-break-inside:avoid; min-height:16pt;">
                        <div style="position:absolute; left:0; top:0; width:14pt; text-align:right; font-weight:700; font-size:11pt; line-height:1.45;">${l})</div>
                        <div style="position:absolute; left:19pt; top:2pt; width:12pt; height:12pt; border:1.2pt solid #000; border-radius:2.5pt; box-sizing:border-box;"></div>
                        <div style="font-size:11pt; line-height:1.45;">${optImgValid?`<img src="${opt.image}" style="max-height:50pt;width:auto;object-fit:contain;" crossorigin="anonymous">`:opt.text||''}</div>
                    </div>`;
                } else {
                    // Discursiva
                    h+=`<div style="position:relative; padding-left:20pt; margin-bottom:2pt; page-break-inside:avoid; min-height:16pt;">
                        <div style="position:absolute; left:0; top:0; width:14pt; text-align:right; font-weight:700; font-size:11pt; line-height:1.45;">${l})</div>
                        <div style="font-size:11pt; line-height:1.45;">${optImgValid?`<img src="${opt.image}" style="max-height:50pt;width:auto;object-fit:contain;" crossorigin="anonymous">`:opt.text||''}</div>
                    </div>
                    <div style="border-bottom:0.5pt solid #ccc;height:16pt;width:100%;margin-bottom:3pt;"></div>`;
                }
            });
            h+=`</div>`;
        }
        if(q.type==='matching'){
            h+=`<div style="margin-top:5pt;margin-left:12pt;">`;
            q.opcoes.forEach((opt,i)=>{
                const l=String.fromCharCode(97+i);
                const optImgValid = opt.type==='image' && opt.image && opt.image.length > 30;

                h+=`<div style="display:table; width:100%; margin-bottom:8pt; page-break-inside:avoid;">
                    <div style="display:table-cell; width:50%; vertical-align:top; padding-right:10pt;">
                        <div style="position:relative; padding-left:20pt; min-height:16pt;">
                            <div style="position:absolute; left:0; top:0; width:14pt; text-align:right; font-weight:700; font-size:11pt; line-height:1.45;">${l})</div>
                            <div style="font-size:11pt; line-height:1.45;">${optImgValid?`<img src="${opt.image}" style="max-height:40pt;width:auto;border:0.5pt solid #ccc;" crossorigin="anonymous">`:opt.text||''}</div>
                        </div>
                    </div>
                    <div style="display:table-cell; width:50%; vertical-align:top;">
                        <div style="position:relative; padding-left:20pt; min-height:16pt;">
                            <div style="position:absolute; left:0; top:2pt; width:12pt; height:12pt; border:1.2pt solid #000; border-radius:2.5pt; box-sizing:border-box;"></div>
                            <div style="font-size:11pt; line-height:1.45;">${opt.matchText||''}</div>
                        </div>
                    </div>
                </div>`;
            });
            h+=`</div>`;
        }
    }
    
    h+=`</div>`;
    return h;
}

// =============================================
// NOVO MOTOR DE PAGINAÇÃO (DOM)
// =============================================
async function waitForImagesToLoad(element) {
    const images = Array.from(element.querySelectorAll('img'));
    if (images.length === 0) return;
    
    await Promise.all(images.map(img => {
        if (img.complete && img.naturalHeight !== 0) return Promise.resolve();
        return new Promise(resolve => {
            img.onload = resolve;
            img.onerror = resolve; 
        });
    }));
    await new Promise(r => setTimeout(r, 50));
}

async function createPaginatedDOM() {
    const container = document.createElement('div');
    container.className = 'flex flex-col gap-8 items-start md:items-center w-full min-w-max';

    const measureWrapper = document.createElement('div');
    measureWrapper.style.cssText = 'position:fixed; left:-9999px; top:0; visibility:hidden;';
    document.body.appendChild(measureWrapper);

    const mmDiv = document.createElement('div');
    mmDiv.style.height = '267mm'; 
    measureWrapper.appendChild(mmDiv);
    const safeHeightPx = mmDiv.getBoundingClientRect().height - 5; 
    measureWrapper.removeChild(mmDiv);

    let sheets = [];
    let currentSheet, currentContent;

    function newSheet() {
        const sheet = document.createElement('div');
        sheet.className = 'a4-sheet';
        sheet.style.padding = '15mm';
        
        const content = document.createElement('div');
        content.style.width = '100%';
        sheet.appendChild(content);
        
        sheets.push({ sheet, content });
        measureWrapper.appendChild(sheet); 
        return { sheet, content };
    }

    let { sheet, content } = newSheet();

    if(headerData.imagem){
        const img = document.createElement('img');
        img.src = headerData.imagem;
        img.style.cssText = 'width:100%; display:block; max-height:40mm; object-fit:contain; margin-bottom:8pt;';
        img.crossOrigin = "anonymous";
        await new Promise(r => { img.onload=r; img.onerror=r; });
        content.appendChild(img);
    }
    
    const titleText = document.getElementById('assessment-title').value.trim();
    if(titleText){
        const h1 = document.createElement('h1');
        h1.style.cssText = 'text-align:center; font-size:14pt; font-weight:900; text-transform:uppercase; margin:0 0 10pt 0; letter-spacing:.04em; padding-bottom:6pt; border-bottom:2pt solid #000;';
        h1.textContent = titleText;
        content.appendChild(h1);
    }

    for(let i=0; i<questions.length; i++){
        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = buildQuestaoHTML(questions[i], i);
        const qNode = tempDiv.firstElementChild;
        content.appendChild(qNode);

        await waitForImagesToLoad(qNode);

        if(content.getBoundingClientRect().height > safeHeightPx) {
            const qCount = content.querySelectorAll('.q-block').length;
            if(qCount > 1) { 
                content.removeChild(qNode);
                const next = newSheet();
                sheet = next.sheet;
                content = next.content;
                content.appendChild(qNode);
                await waitForImagesToLoad(qNode);
            }
        }
    }

    const totalPages = sheets.length;
    sheets.forEach((s, index) => {
        const footer = document.createElement('div');
        footer.style.cssText = 'position: absolute; bottom: 15mm; right: 15mm; font-size: 9pt; font-weight: 700; color: #000; font-family: Arial, sans-serif;';
        footer.textContent = `${index + 1} / ${totalPages}`;
        s.sheet.appendChild(footer);
        
        container.appendChild(s.sheet);
    });

    document.body.removeChild(measureWrapper);
    return container;
}

// =============================================
// PREVIEW VISUAL RENDERIZADA
// =============================================
async function enterPreviewMode(){
    document.body.classList.add('preview-mode');
    window.scrollTo(0,0);
    
    const printContent = document.getElementById('print-content');
    printContent.innerHTML = '<div class="text-white flex flex-col items-center gap-4 mt-20 w-full" style="min-width:100vw"><div class="loader w-10 h-10 border-4 border-t-transparent border-blue-500 rounded-full animate-spin" style="animation: spinner 1s linear infinite"></div><p class="font-bold text-sm uppercase tracking-widest text-slate-400">Processando e paginando prova...</p></div>';
    
    const paginatedDOM = await createPaginatedDOM();
    printContent.innerHTML = '';
    printContent.appendChild(paginatedDOM);
}

function exitPreviewMode(){
    document.body.classList.remove('preview-mode');
    document.getElementById('print-content').innerHTML = ''; 
}

// =============================================
// GERAR PDF (Via Preview)
// =============================================
async function generatePDF(fromPreview = false){
    const rawTitle = document.getElementById('assessment-title').value.trim() || 'avaliacao';
    const filename = rawTitle.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'-').replace(/[^a-z0-9\-]/g,'') + '.pdf';

    // Se estiver a gerar pela tela inicial (fromPreview = false)
    if(!fromPreview) {
        showToast('Preparando documento...', 'info', 2000);
        await enterPreviewMode();
        // PAUSA ESTRATÉGICA: Dá tempo ao navegador de desenhar a tela antes do snapshot
        await new Promise(r => setTimeout(r, 800)); 
    }

    showToast('A gerar PDF da prova...','info',10000);
    const pages = document.getElementById('print-content').querySelectorAll('.a4-sheet');

    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF('p', 'mm', 'a4');
        const pdfW = pdf.internal.pageSize.getWidth();
        const pdfH = pdf.internal.pageSize.getHeight();

        for(let i=0; i<pages.length; i++){
            if(i > 0) pdf.addPage();
            
            const originalShadow = pages[i].style.boxShadow;
            pages[i].style.boxShadow = 'none';
            
            const canvas = await html2canvas(pages[i], {
                scale: 2, 
                useCORS: true,
                allowTaint: true,
                logging: false,
                backgroundColor: '#ffffff'
            });
            
            pages[i].style.boxShadow = originalShadow; 
            
            const imgData = canvas.toDataURL('image/jpeg', 0.95);
            pdf.addImage(imgData, 'JPEG', 0, 0, pdfW, pdfH);
        }

        pdf.save(filename);
        showToast('✓ PDF gerado com paginação perfeita!','success');
        
        if(!fromPreview) exitPreviewMode();

    } catch(e) {
        console.error("Erro na geração de PDF:", e);
        showToast('Erro ao gerar PDF. Verifique a sua conexão.','error');
        if(!fromPreview) exitPreviewMode();
    }
}

    await enterPreviewMode();

}

function updateImageWidth(qId,val){
    const q=questions.find(qu=>qu.id===qId);q.imageWidth=parseInt(val);

function adjustLines(qId,d){const q=questions.find(qu=>qu.id===qId);q.linhas=Math.max(1,Math.min(20,(parseInt(q.linhas)||4)+d));const el=document.getElementById(`lines-d-${qId}`);if(el)el.textContent=q.linhas;}
function setOptType(qId,oId,type){questions.find(qu=>qu.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).type=type;renderQuestions();}
function updateOptText(qId,oId,val){questions.find(qu=>qu.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).text=val;}
function updateOptMatch(qId,oId,val){questions.find(qu=>qu.id===qId).opcoes.find(o=>o.id.toString()===oId.toString()).matchText=val;}
function removeOption(qId,oId){const q=questions.find(qu=>qu.id===qId);if(q.opcoes.length<=1){showToast('Mínimo de 1 opção','warning');return;}q.opcoes=q.opcoes.filter(o=>o.id.toString()!==oId.toString());renderQuestions();}
