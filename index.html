<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Avaliações - Padrão System</title>
    <!-- Tailwind CSS para o Design System -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs (Versão Compatível) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .rich-text-area:empty:before { content: attr(data-placeholder); color: #94a3b8; pointer-events: none; display: block; }
        
        /* Estilos de Impressão A4 */
        @page { size: A4; margin: 15mm !important; }
        @media print {
            body { background: white !important; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            .page-break { page-break-inside: avoid; }
            .content-render p, .content-render div { margin: 0; padding: 0; display: inline; }
            .content-render br { display: block; content: ""; margin-top: 0; }
        }

        .btn-active:active { transform: scale(0.96); }
        .card-premium { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-premium:hover { transform: translateY(-4px); shadow: 0 25px 50px -12px rgb(0 0 0 / 0.1); }
        
        /* Loading Animation */
        .loader { border-top-color: #2563eb; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 overflow-x-hidden">

    <!-- TELA DE LOGIN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
        <div class="w-full max-w-md bg-white rounded-[3.5rem] shadow-[0_30px_100px_rgba(0,0,0,0.08)] border border-slate-100 p-12 space-y-12 animate-in fade-in zoom-in duration-700">
            <div class="text-center space-y-4">
                <div class="w-24 h-24 bg-blue-600 rounded-[2.5rem] flex items-center justify-center shadow-2xl shadow-blue-200 mx-auto rotate-6 transition-transform hover:rotate-0 duration-500">
                    <i data-lucide="file-text" class="text-white w-12 h-12 -rotate-6"></i>
                </div>
                <div>
                    <h1 class="text-4xl font-black text-slate-900 tracking-tighter">Avaliações</h1>
                    <p class="text-slate-400 font-semibold text-lg mt-1 tracking-tight">Painel do Professor</p>
                </div>
            </div>

            <!-- Alerta de Configuração em falta -->
            <div id="config-alert" class="hidden bg-amber-50 text-amber-700 p-5 rounded-3xl text-xs font-bold border border-amber-100 leading-relaxed">
                ⚠️ ATENÇÃO: As chaves do Firebase não foram encontradas no código. Verifique o final do arquivo HTML.
            </div>

            <form id="login-form" class="space-y-7">
                <div id="auth-error" class="hidden bg-red-50 text-red-600 p-5 rounded-3xl text-sm font-bold border border-red-100"></div>
                
                <div class="space-y-5">
                    <div class="relative group">
                        <i data-lucide="mail" class="absolute left-6 top-6 w-5 h-5 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="email" id="login-email" required class="w-full pl-16 pr-8 py-6 bg-slate-50 border-0 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-slate-700" placeholder="E-mail">
                    </div>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-6 top-6 w-5 h-5 text-slate-300 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="password" id="login-password" required class="w-full pl-16 pr-8 py-6 bg-slate-50 border-0 rounded-3xl outline-none focus:ring-4 focus:ring-blue-100 transition-all font-medium text-slate-700" placeholder="Senha">
                    </div>
                </div>

                <button type="submit" id="btn-login" class="w-full py-6 bg-slate-950 text-white rounded-[2rem] font-black uppercase text-sm tracking-widest shadow-2xl hover:bg-blue-600 btn-active transition-all flex items-center justify-center gap-3">
                    <span>Aceder ao Sistema</span>
                    <div id="login-spinner" class="hidden w-5 h-5 border-4 border-slate-700 loader rounded-full"></div>
                </button>
            </form>
            <p class="text-center text-[10px] text-slate-300 font-black uppercase tracking-[0.3em]">© Default Gemini Project</p>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-screen" class="hidden">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 h-24 sticky top-0 z-50">
            <div class="max-w-7xl mx-auto h-full px-8 flex justify-between items-center">
                <div class="flex items-center gap-5">
                    <div class="w-14 h-14 bg-blue-600 rounded-[1.5rem] flex items-center justify-center shadow-2xl rotate-3"><i data-lucide="file-text" class="text-white w-7 h-7"></i></div>
                    <div class="hidden sm:block">
                        <h1 class="text-xl font-black text-slate-900 tracking-tight leading-none">Avaliações</h1>
                        <p id="user-display" class="text-[10px] text-blue-600 font-bold uppercase tracking-widest mt-1.5 flex items-center gap-1.5">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            A carregar...
                        </p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleSavedModal()" class="p-4 bg-slate-50 text-slate-500 rounded-[1.25rem] hover:bg-slate-100 btn-active"><i data-lucide="folder-open" class="w-6 h-6"></i></button>
                    <button id="btn-save" onclick="saveToCloud()" class="flex items-center gap-2.5 bg-emerald-500 text-white px-7 py-4 rounded-[1.25rem] font-black uppercase text-xs tracking-widest shadow-xl shadow-emerald-100 hover:bg-emerald-600 btn-active transition-all">
                        <i data-lucide="save" class="w-5 h-5"></i><span class="hidden md:inline">Salvar</span>
                    </button>
                    <button onclick="enterPrintMode()" class="bg-slate-950 text-white px-7 py-4 rounded-[1.25rem] font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-blue-600 btn-active flex items-center gap-2.5">
                        <i data-lucide="printer" class="w-5 h-5"></i><span class="hidden md:inline">PDF</span>
                    </button>
                    <button onclick="handleLogout()" class="p-4 text-red-500 hover:bg-red-50 rounded-[1.25rem] btn-active"><i data-lucide="log-out" class="w-6 h-6"></i></button>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-6 space-y-12 mt-10">
            <!-- Estrutura Principal -->
            <section class="bg-white rounded-[3rem] shadow-[0_15px_50px_rgba(0,0,0,0.03)] border border-slate-100 p-10 space-y-12 card-premium">
                <div class="flex items-center gap-4">
                    <span class="w-12 h-12 bg-blue-50 text-blue-600 flex items-center justify-center rounded-2xl text-xl font-black">01</span>
                    <h2 class="text-3xl font-black text-slate-900 tracking-tighter">Configuração</h2>
                </div>
                <div class="w-full">
                    <div id="header-upload-container">
                        <label class="flex flex-col items-center justify-center gap-6 w-full py-20 px-8 border-2 border-dashed border-slate-200 rounded-[3rem] cursor-pointer hover:bg-blue-50/50 transition-all text-slate-400 bg-slate-50/50 group/upload">
                            <div class="w-20 h-20 bg-white rounded-3xl flex items-center justify-center shadow-sm group-hover:scale-110 transition-transform duration-500"><i data-lucide="image" class="w-10 h-10 text-slate-300"></i></div>
                            <span class="font-black text-slate-600 text-lg uppercase tracking-widest text-center px-4">Carregar Cabeçalho Institucional</span>
                            <input type="file" accept="image/*" class="hidden" onchange="uploadHeader(this)">
                        </label>
                    </div>
                    <div id="header-preview-container" class="hidden relative group shadow-xl rounded-[2rem] overflow-hidden border-8 border-white">
                        <img id="header-img-preview" src="" class="w-full object-contain">
                        <button onclick="removeHeader()" class="absolute top-4 right-4 bg-white text-red-500 p-4 rounded-3xl shadow-2xl border border-red-50 opacity-0 group-hover:opacity-100 transition-all hover:bg-red-600 hover:text-white scale-90 group-hover:scale-100"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                    </div>
                </div>
                <div class="space-y-4">
                    <input type="text" id="assessment-title" class="w-full p-10 bg-slate-50 border-0 rounded-[2.5rem] outline-none text-center font-black text-4xl text-slate-950 focus:ring-8 focus:ring-blue-50/50 transition-all shadow-inner uppercase placeholder:text-slate-200" placeholder="Título da Avaliação">
                </div>
            </section>

            <!-- Contentor de Questões -->
            <div id="questions-container" class="space-y-12 pb-40"></div>
        </main>

        <!-- Dock Menu Inferior -->
        <div class="fixed bottom-10 left-0 right-0 z-40 px-6 no-print">
            <div class="max-w-3xl mx-auto bg-slate-950/95 backdrop-blur-2xl border border-white/10 p-3 rounded-[2.5rem] shadow-[0_40px_80px_rgba(0,0,0,0.3)] flex justify-between items-center gap-3 overflow-x-auto no-scrollbar">
                <button onclick="addQuestion('text')" class="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-blue-600 text-white transition-all px-10 py-6 rounded-[1.75rem] font-black text-[10px] uppercase shrink-0 active:scale-90 group">
                    <i data-lucide="align-left" class="w-7 h-7 group-hover:scale-110 transition-transform"></i><span>Escrita</span>
                </button>
                <button onclick="addQuestion('discursive-list')" class="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-orange-500 text-white transition-all px-10 py-6 rounded-[1.75rem] font-black text-[10px] uppercase shrink-0 active:scale-90 group">
                    <i data-lucide="file-text" class="w-7 h-7 group-hover:scale-110 transition-transform"></i><span>Tópicos</span>
                </button>
                <button onclick="addQuestion('matching')" class="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-sky-500 text-white transition-all px-10 py-6 rounded-[1.75rem] font-black text-[10px] uppercase shrink-0 active:scale-90 group">
                    <i data-lucide="link" class="w-7 h-7 group-hover:scale-110 transition-transform"></i><span>Ligar</span>
                </button>
                <button onclick="addQuestion('multiple-choice')" class="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-emerald-500 text-white transition-all px-10 py-6 rounded-[1.75rem] font-black text-[10px] uppercase shrink-0 active:scale-90 group">
                    <i data-lucide="check-square" class="w-7 h-7 group-hover:scale-110 transition-transform"></i><span>Marca X</span>
                </button>
                <button onclick="addQuestion('true-false')" class="flex flex-col items-center justify-center gap-2 bg-white/5 hover:bg-purple-600 text-white transition-all px-10 py-6 rounded-[1.75rem] font-black text-[10px] uppercase shrink-0 active:scale-90 group">
                    <i data-lucide="list-checks" class="w-7 h-7 group-hover:scale-110 transition-transform"></i><span>V ou F</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL RECORTE -->
    <div id="cropper-modal" class="hidden fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-xl flex items-center justify-center p-8">
        <div class="w-full max-w-4xl bg-white rounded-[4.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[92vh]">
            <div class="p-12 border-b border-slate-50 flex justify-between items-center bg-slate-50/30">
                <h3 class="font-black text-3xl text-slate-950 tracking-tighter">Ajustar Print</h3>
                <button onclick="closeCropper()" class="p-4 bg-white hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-3xl shadow-sm transition-all"><i data-lucide="x" class="w-8 h-8"></i></button>
            </div>
            <div id="crop-area" class="flex-1 w-full overflow-hidden flex flex-col items-center justify-center p-14 bg-slate-100 relative shadow-inner">
                <div class="relative inline-block touch-none select-none max-w-full max-h-[55vh] shadow-2xl rounded-2xl overflow-hidden bg-white border-[16px] border-white">
                    <img id="img-to-crop" src="" class="block max-w-full max-h-[55vh] object-contain pointer-events-none opacity-95">
                    <div id="crop-rect" class="absolute border-[6px] border-blue-500 bg-blue-500/10 shadow-[0_0_0_9999px_rgba(0,0,0,0.6)] pointer-events-none hidden"></div>
                </div>
            </div>
            <div class="p-12 bg-white flex gap-8 flex-col sm:flex-row shadow-2xl">
                <button onclick="applyCrop(true)" class="flex-1 py-8 px-10 bg-slate-50 text-slate-600 rounded-[2.5rem] font-black uppercase text-xs tracking-widest hover:bg-slate-100 active:scale-95 transition-all">Imagem Inteira</button>
                <button onclick="applyCrop(false)" class="flex-1 py-8 px-10 bg-blue-600 text-white rounded-[2.5rem] font-black uppercase text-xs tracking-widest shadow-2xl hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-4"><i data-lucide="check" class="w-8 h-8"></i> Finalizar Recorte</button>
            </div>
        </div>
    </div>

    <!-- MODAL ARQUIVOS SALVOS -->
    <div id="saved-modal" class="hidden fixed inset-0 z-[60] bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-6">
        <div class="w-full max-w-2xl bg-white rounded-[3.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[85vh] animate-in zoom-in-95 duration-500">
            <div class="p-10 border-b border-slate-50 flex justify-between items-center bg-slate-50/20">
                <div>
                    <h3 class="font-black text-3xl text-slate-900 tracking-tighter leading-none">Minhas Provas</h3>
                    <p id="saved-count-label" class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-2"></p>
                </div>
                <button onclick="toggleSavedModal()" class="p-4 bg-white hover:bg-slate-100 rounded-3xl shadow-sm border border-slate-50"><i data-lucide="x" class="w-6 h-6 text-slate-400"></i></button>
            </div>
            <div id="saved-list" class="flex-1 overflow-y-auto p-10 space-y-5 no-scrollbar">
                <!-- Lista via JS -->
            </div>
        </div>
    </div>

    <div id="print-view" class="hidden"></div>

    <script>
        // ==========================================
        // 1. CONFIGURAÇÃO FIREBASE - VOCÊ DEVE SUBSTITUIR AQUI
        // ==========================================
        const firebaseConfig = { 
          apiKey : "AIzaSyArNQ2dWrDel38ODodLfIT1v3JToREGgdg" , 
          authDomain : "gen-lang-client-0109590811.firebaseapp.com" , 
          ID do projeto : "gen-lang-client-0109590811" , 
          bucket de armazenamento : "gen-lang-client-0109590811.firebasestorage.app" , 
          messagingSenderId : " 469349194249" 
          appId : "1:469349194249:web:a83b7e3cbe442a4930b6d8" 
        };
        
        // Verificação automática (para este ambiente)
        let initializedConfig = firebaseConfig;
        try {
            if (typeof __firebase_config !== 'undefined') {
                initializedConfig = JSON.parse(__firebase_config);
            }
        } catch(e) {}

        // Inicialização do Firebase
        const isConfigured = initializedConfig.apiKey && initializedConfig.apiKey !== "COLE_AQUI";
        if (!isConfigured) {
            document.getElementById('config-alert').classList.remove('hidden');
        } else {
            firebase.initializeApp(initializedConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();
        const appIdStr = "sistema-avaliacoes-system-v1";

        // ==========================================
        // 2. ESTADO E AUTENTICAÇÃO
        // ==========================================
        let questions = [];
        let headerData = { id: null, imagem: null, titulo: '' };
        let cropState = { questionId: null, optionId: null, startX: 0, startY: 0, isDragging: false };

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Impede o recarregamento da página
            
            if (!isConfigured) return alert("Por favor, configure as chaves do Firebase primeiro.");

            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            const errDiv = document.getElementById('auth-error');
            const spinner = document.getElementById('login-spinner');
            const btnText = document.querySelector('#btn-login span');

            errDiv.classList.add('hidden');
            spinner.classList.remove('hidden');
            btnText.innerText = "A autenticar...";

            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (err) {
                console.error(err);
                errDiv.innerText = "E-mail ou senha inválidos. Tente novamente.";
                errDiv.classList.remove('hidden');
                spinner.classList.add('hidden');
                btnText.innerText = "Aceder ao Sistema";
            }
        });

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('user-display').innerHTML = `<span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Professor: ${user.email.split('@')[0]}`;
                loadSavedAssessments();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function handleLogout() { auth.signOut(); }

        // ==========================================
        // 3. LOGICA DE QUESTÕES
        // ==========================================
        function addQuestion(type) {
            const q = {
                id: Date.now().toString(),
                type: type,
                textoApoio: '', enunciado: '', imagem: null, imageWidth: 30,
                opcoes: ['multiple-choice', 'true-false', 'discursive-list', 'matching'].includes(type) ? [
                    { id: Date.now() + 1, text: '', image: null, matchText: '', type: 'text' },
                    { id: Date.now() + 2, text: '', image: null, matchText: '', type: 'text' }
                ] : [],
                linhas: 3
            };
            questions.push(q);
            renderQuestions();
        }

        function removeQuestion(id) {
            questions = questions.filter(q => q.id !== id);
            renderQuestions();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = `
                <div class="flex items-center justify-between px-6 pt-6">
                    <div class="flex items-center gap-4">
                        <span class="w-12 h-12 bg-blue-50 text-blue-600 flex items-center justify-center rounded-2xl text-xl font-black">02</span>
                        <h2 class="text-3xl font-black text-slate-900 tracking-tighter">Conteúdo</h2>
                    </div>
                    <div class="bg-slate-950 text-white px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] shadow-lg">${questions.length} ITENS</div>
                </div>
            `;

            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-[3.5rem] shadow-[0_20px_60px_rgba(0,0,0,0.03)] border border-slate-100 overflow-hidden transition-all hover:shadow-2xl group/card border-b-8 border-b-slate-50 hover:border-b-blue-600";
                
                card.innerHTML = `
                    <div class="bg-slate-50/80 px-12 py-8 flex justify-between items-center border-b border-slate-50">
                        <div class="flex items-center gap-6">
                            <i data-lucide="grip-vertical" class="w-6 h-6 text-slate-300"></i>
                            <span class="font-black text-slate-900 text-3xl tracking-tighter">Questão ${index + 1}</span>
                            <span class="bg-white px-5 py-2 rounded-2xl font-black text-[10px] text-blue-600 shadow-sm border border-blue-100">${q.type.toUpperCase()}</span>
                        </div>
                        <button onclick="removeQuestion('${q.id}')" class="p-4 bg-white text-slate-200 hover:text-red-500 hover:shadow-xl rounded-3xl transition-all active:scale-90"><i data-lucide="trash-2" class="w-7 h-7"></i></button>
                    </div>
                    <div class="p-12 space-y-12">
                        <div class="space-y-4">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Contexto / Texto de Apoio</p>
                            <div id="apoio-${q.id}" class="rich-text-area border rounded-[2rem] p-6 min-h-[60px] bg-slate-50/20 focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all outline-none" contenteditable="true" data-placeholder="Escreva o texto base...">${q.textoApoio}</div>
                        </div>
                        
                        <div class="space-y-5">
                            ${!q.imagem ? `
                                <label class="flex items-center gap-6 w-full p-8 border-2 border-dashed border-slate-100 rounded-[2.5rem] cursor-pointer hover:bg-slate-50 transition-all text-slate-400 bg-slate-50/30 group shadow-inner">
                                    <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-sm"><i data-lucide="image" class="w-7 h-7 text-slate-300"></i></div>
                                    <span class="font-black text-sm uppercase tracking-widest">Incluir Imagem Central</span>
                                    <input type="file" accept="image/*" class="hidden" onchange="uploadImage('${q.id}', null, this)">
                                </label>
                            ` : `
                                <div class="bg-slate-50/50 rounded-[3rem] p-10 space-y-8 border border-slate-100 shadow-inner">
                                    <div class="relative flex justify-center group/qi shadow-2xl rounded-[2rem] overflow-hidden border-[12px] border-white bg-white">
                                        <img src="${q.imagem}" style="width: ${q.imageWidth}%">
                                        <button onclick="removeQuestionImage('${q.id}')" class="absolute top-6 right-6 bg-white text-red-500 p-4 rounded-3xl shadow-2xl border border-red-50 opacity-0 group-hover/qi:opacity-100 transition-all"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                                    </div>
                                    <div class="max-w-md mx-auto space-y-3">
                                        <div class="flex justify-between font-black text-[10px] text-slate-400 uppercase tracking-widest"><span>TAMANHO</span><span>${q.imageWidth}%</span></div>
                                        <input type="range" min="10" max="100" value="${q.imageWidth}" onchange="updateImageWidth('${q.id}', this.value)" class="w-full h-2 bg-slate-200 rounded-full appearance-none accent-blue-600 cursor-pointer shadow-inner">
                                    </div>
                                </div>
                            `}
                        </div>

                        <div class="space-y-4 pt-4 border-t border-slate-50">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Enunciado da Pergunta</p>
                            <div id="enunciado-${q.id}" class="rich-text-area border rounded-[2rem] p-6 min-h-[60px] bg-slate-50/20 focus:bg-white focus:ring-4 focus:ring-blue-50 transition-all outline-none" contenteditable="true" data-placeholder="Pergunta principal...">${q.enunciado}</div>
                        </div>

                        <div id="options-${q.id}" class="space-y-6"></div>
                    </div>
                `;
                container.appendChild(card);
                
                // Renderização de Alternativas
                const optContainer = document.getElementById(`options-${q.id}`);
                if (['multiple-choice', 'true-false', 'discursive-list', 'matching'].includes(q.type)) {
                    q.opcoes.forEach((opt, oIdx) => {
                        const optDiv = document.createElement('div');
                        optDiv.className = `flex gap-6 group/opt items-start bg-slate-50/40 p-8 rounded-[3rem] border border-slate-100 transition-all hover:bg-white hover:shadow-xl ${q.type === 'matching' ? '' : 'flex-col md:flex-row'}`;
                        optDiv.innerHTML = `
                            <div class="flex-1 w-full space-y-5">
                                <div class="flex items-center justify-between">
                                    <span class="w-12 h-12 bg-slate-950 text-white flex items-center justify-center rounded-2xl text-sm font-black shadow-xl">${String.fromCharCode(97 + oIdx)}</span>
                                    <div class="flex bg-white p-1.5 rounded-2xl gap-2 shadow-sm border border-slate-100">
                                        <button onclick="setOptType('${q.id}', '${opt.id}', 'text')" class="px-5 py-2.5 rounded-xl text-[10px] font-black transition-all ${opt.type === 'text' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400'}">TEXTO</button>
                                        <button onclick="setOptType('${q.id}', '${opt.id}', 'image')" class="px-5 py-2.5 rounded-xl text-[10px] font-black transition-all ${opt.type === 'image' ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400'}">FOTO</button>
                                    </div>
                                </div>
                                ${opt.type === 'image' ? `
                                    <div class="flex justify-center bg-white rounded-[2rem] p-8 border-2 border-dashed border-slate-100 shadow-inner">
                                        ${!opt.image ? `
                                            <label class="cursor-pointer text-slate-300 text-center flex flex-col items-center"><i data-lucide="image" class="w-10 h-10 mb-2"></i><span class="text-[10px] font-black uppercase tracking-widest">Carregar Print</span><input type="file" accept="image/*" class="hidden" onchange="uploadImage('${q.id}', '${opt.id}', this)"></label>
                                        ` : `
                                            <div class="relative group/oimg"><img src="${opt.image}" class="h-36 w-auto rounded-2xl object-contain shadow-lg border border-slate-50"><button onclick="removeOptImage('${q.id}', '${opt.id}')" class="absolute -top-4 -right-4 bg-red-500 text-white p-3 rounded-full shadow-2xl transition-all scale-100 hover:scale-110"><i data-lucide="x" class="w-4 h-4"></i></button></div>
                                        `}
                                    </div>
                                ` : `
                                    <input type="text" value="${opt.text}" oninput="updateOptText('${q.id}', '${opt.id}', this.value)" class="w-full p-6 bg-white border-0 rounded-3xl font-black text-slate-700 outline-none focus:ring-8 focus:ring-blue-50/50 shadow-inner transition-all placeholder:text-slate-200" placeholder="Digite a alternativa...">
                                `}
                            </div>
                            ${q.type === 'matching' ? `
                                <div class="flex-1 w-full pt-16">
                                    <div class="flex items-center gap-4 group/m">
                                        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center shadow-sm border border-slate-100 group-hover:rotate-180 transition-transform duration-700"><i data-lucide="arrow-right-left" class="w-6 h-6 text-blue-500"></i></div>
                                        <input type="text" value="${opt.matchText}" oninput="updateOptMatch('${q.id}', '${opt.id}', this.value)" class="w-full p-6 bg-white border-0 rounded-3xl font-black text-slate-700 outline-none focus:ring-8 focus:ring-blue-50/50 shadow-inner" placeholder="Destino da ligação...">
                                    </div>
                                </div>
                            ` : ''}
                            <button onclick="removeOption('${q.id}', '${opt.id}')" class="p-5 text-slate-200 hover:text-red-500 transition-all active:scale-90 ${q.type === 'matching' ? 'mt-16' : 'self-end md:mt-16'}"><i data-lucide="trash-2" class="w-7 h-7"></i></button>
                        `;
                        optContainer.appendChild(optDiv);
                    });
                    
                    const addOptBtn = document.createElement('button');
                    addOptBtn.className = "w-full py-8 border-2 border-dashed border-slate-200 rounded-[3rem] text-blue-600 font-black text-xs uppercase tracking-[0.4em] hover:bg-white hover:border-blue-500 transition-all flex items-center justify-center gap-5 active:scale-95 group";
                    addOptBtn.innerHTML = `<i data-lucide="plus-circle" class="w-8 h-8 group-hover:rotate-180 transition-transform duration-700"></i> ADICIONAR NOVO ITEM`;
                    addOptBtn.onclick = () => addOption(q.id);
                    optContainer.appendChild(addOptBtn);
                }

                if(q.type === 'text') {
                    const rowDiv = document.createElement('div');
                    rowDiv.className = "flex items-center gap-6 bg-slate-50/50 p-8 rounded-[3rem] border border-slate-100 shadow-inner transition-all hover:bg-white";
                    rowDiv.innerHTML = `
                        <div class="w-16 h-16 bg-white rounded-3xl flex items-center justify-center shadow-sm border border-slate-100"><i data-lucide="align-left" class="w-8 h-8 text-blue-500"></i></div>
                        <div class="flex-1 flex items-center justify-between">
                            <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Espaço para Resposta</label>
                            <input type="number" value="${q.linhas}" onchange="updateLines('${q.id}', this.value)" class="w-24 p-6 bg-white border-0 rounded-3xl font-black text-center text-blue-600 focus:ring-8 focus:ring-blue-50/50 outline-none shadow-sm transition-all">
                        </div>
                    `;
                    optContainer.appendChild(rowDiv);
                }

                document.getElementById(`apoio-${q.id}`).onblur = (e) => { q.textoApoio = e.target.innerHTML; };
                document.getElementById(`enunciado-${q.id}`).onblur = (e) => { q.enunciado = e.target.innerHTML; };
            });
            lucide.createIcons();
        }

        // ==========================================
        // 4. SISTEMA DE RECORTE (CROP)
        // ==========================================
        function uploadImage(qId, oId, input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                cropState.questionId = qId;
                cropState.optionId = oId;
                document.getElementById('img-to-crop').src = e.target.result;
                document.getElementById('cropper-modal').classList.remove('hidden');
                initCrop();
            };
            reader.readAsDataURL(file);
        }

        function initCrop() {
            const img = document.getElementById('img-to-crop');
            const rect = document.getElementById('crop-rect');
            rect.classList.add('hidden');
            const container = img.parentElement;
            
            container.onmousedown = (e) => {
                const b = img.getBoundingClientRect();
                cropState.startX = e.clientX - b.left;
                cropState.startY = e.clientY - b.top;
                cropState.isDragging = true;
                rect.style.left = cropState.startX + 'px';
                rect.style.top = cropState.startY + 'px';
                rect.style.width = '0px';
                rect.style.height = '0px';
                rect.classList.remove('hidden');
            };

            container.onmousemove = (e) => {
                if (!cropState.isDragging) return;
                const b = img.getBoundingClientRect();
                const curX = e.clientX - b.left;
                const curY = e.clientY - b.top;
                rect.style.width = Math.abs(curX - cropState.startX) + 'px';
                rect.style.height = Math.abs(curY - cropState.startY) + 'px';
                rect.style.left = Math.min(curX, cropState.startX) + 'px';
                rect.style.top = Math.min(curY, cropState.startY) + 'px';
            };

            container.onmouseup = () => cropState.isDragging = false;
        }

        function applyCrop(full) {
            const img = document.getElementById('img-to-crop');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            if (full) {
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
            } else {
                const rect = document.getElementById('crop-rect').getBoundingClientRect();
                const b = img.getBoundingClientRect();
                const scaleX = img.naturalWidth / b.width;
                const scaleY = img.naturalHeight / b.height;
                canvas.width = rect.width * scaleX;
                canvas.height = rect.height * scaleY;
                ctx.drawImage(img, (rect.left - b.left) * scaleX, (rect.top - b.top) * scaleY, rect.width * scaleX, rect.height * scaleY, 0, 0, canvas.width, canvas.height);
            }

            const data = canvas.toDataURL();
            const q = questions.find(qu => qu.id === cropState.questionId);
            if (cropState.optionId) {
                q.opcoes.find(o => o.id.toString() === cropState.optionId.toString()).image = data;
            } else { q.imagem = data; }
            closeCropper();
            renderQuestions();
        }

        function closeCropper() { document.getElementById('cropper-modal').classList.add('hidden'); }
        function removeQuestionImage(qId) { questions.find(q => q.id === qId).imagem = null; renderQuestions(); }
        function removeOptImage(qId, oId) { questions.find(q => q.id === qId).opcoes.find(o => o.id.toString() === oId.toString()).image = null; renderQuestions(); }

        // ==========================================
        // 5. CABEÇALHO E CLOUD
        // ==========================================
        function uploadHeader(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    headerData.imagem = e.target.result;
                    document.getElementById('header-upload-container').classList.add('hidden');
                    document.getElementById('header-preview-container').classList.remove('hidden');
                    document.getElementById('header-img-preview').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }
        function removeHeader() {
            headerData.imagem = null;
            document.getElementById('header-upload-container').classList.remove('hidden');
            document.getElementById('header-preview-container').classList.add('hidden');
        }

        async function saveToCloud() {
            if (!auth.currentUser) return alert("Sessão expirada. Faça login novamente.");
            const title = document.getElementById('assessment-title').value;
            if (!title) return alert("Por favor, digite um título para a prova.");

            const btnSave = document.getElementById('btn-save');
            btnSave.disabled = true;
            btnSave.innerText = "A salvar...";

            headerData.titulo = title;
            const docId = headerData.id || Date.now().toString();
            
            try {
                await db.collection('artifacts').doc(appIdStr).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').doc(docId).set({
                    id: docId,
                    headerData: headerData,
                    questions: questions,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                headerData.id = docId;
                alert("Avaliação guardada com sucesso!");
            } catch(e) { alert("Erro ao guardar dados."); }
            finally {
                btnSave.disabled = false;
                btnSave.innerHTML = `<i data-lucide="save" class="w-5 h-5"></i><span class="hidden md:inline">Salvar</span>`;
                lucide.createIcons();
            }
        }

        function toggleSavedModal() {
            const m = document.getElementById('saved-modal');
            m.classList.toggle('hidden');
            if (!m.classList.contains('hidden')) loadSavedAssessments();
        }

        async function loadSavedAssessments() {
            if (!auth.currentUser) return;
            const list = document.getElementById('saved-list');
            list.innerHTML = '<div class="text-center py-10"><div class="w-8 h-8 border-4 border-blue-600 loader rounded-full mx-auto"></div></div>';

            const snap = await db.collection('artifacts').doc(appIdStr).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').get();
            list.innerHTML = '';
            document.getElementById('saved-count-label').innerText = `${snap.size} ficheiros no banco de dados`;
            
            snap.forEach(doc => {
                const data = doc.data();
                const item = document.createElement('div');
                item.className = "p-7 bg-slate-50/50 rounded-[2rem] border border-slate-100 flex justify-between items-center hover:bg-white hover:border-blue-200 transition-all cursor-pointer group shadow-sm hover:shadow-xl";
                item.onclick = () => {
                    headerData = data.headerData;
                    questions = data.questions;
                    document.getElementById('assessment-title').value = headerData.titulo || '';
                    if (headerData.imagem) {
                        document.getElementById('header-upload-container').classList.add('hidden');
                        document.getElementById('header-preview-container').classList.remove('hidden');
                        document.getElementById('header-img-preview').src = headerData.imagem;
                    } else { removeHeader(); }
                    renderQuestions();
                    toggleSavedModal();
                };
                item.innerHTML = `
                    <div class="flex-1">
                        <h4 class="font-black text-slate-900 text-xl uppercase tracking-tighter leading-none mb-3">${data.headerData.titulo || 'Sem Título'}</h4>
                        <span class="text-[10px] bg-blue-50 text-blue-600 px-3 py-1 rounded-full font-black uppercase tracking-widest">${data.questions.length} ITENS</span>
                    </div>
                    <button onclick="event.stopPropagation(); deleteDoc('${data.id}')" class="p-4 text-slate-200 hover:text-red-500 hover:bg-red-50 rounded-2xl"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                `;
                list.appendChild(item);
            });
            lucide.createIcons();
        }

        async function deleteDoc(id) {
            if (!confirm("Eliminar esta avaliação permanentemente?")) return;
            await db.collection('artifacts').doc(appIdStr).collection('users').doc(auth.currentUser.uid).collection('avaliacoes').doc(id).delete();
            loadSavedAssessments();
        }

        // ==========================================
        // 6. IMPRESSÃO
        // ==========================================
        function enterPrintMode() {
            const printView = document.getElementById('print-view');
            const title = document.getElementById('assessment-title').value;
            let html = `
                <div class="print-container bg-white text-black mx-auto relative" style="width: 210mm; min-height: 297mm; padding: 15mm; font-family: Arial, sans-serif; font-size: 12pt; color: #000000; line-height: 1.2;">
                    ${headerData.imagem ? `<div class="mb-2 flex justify-center w-full"><img src="${headerData.imagem}" style="width: 100%; max-width: 187mm"></div>` : ''}
                    <h2 class="text-center font-bold mb-4 uppercase" style="font-size: 16pt;">${title || 'Avaliação'}</h2>
                    <div class="space-y-12">
            `;
            questions.forEach((q, index) => {
                html += `<div class="page-break w-full">
                    ${q.textoApoio ? `<div class="mb-1 text-justify content-render">${q.textoApoio}</div>` : ''}
                    <div class="flex gap-2 mb-1 items-start"><span class="font-bold shrink-0">${index + 1}.</span><div class="font-medium text-justify w-full content-render">${q.enunciado || '...'}</div></div>
                    ${q.imagem ? `<div class="my-6 flex justify-center w-full"><img src="${q.imagem}" style="width: ${q.imageWidth}%" class="object-contain"></div>` : ''}
                    ${q.type === 'text' ? `<div class="mt-1 space-y-5">${Array(q.linhas).fill('<div class="border-b border-black w-full h-4 opacity-50"></div>').join('')}</div>` : ''}
                    ${['multiple-choice', 'true-false', 'discursive-list'].includes(q.type) ? `<div class="mt-1 space-y-2 ml-5">${q.opcoes.map((o, i) => `
                        <div class="flex flex-col gap-1">
                            <div class="flex items-start gap-2">
                                <span class="font-bold shrink-0">${q.type === 'true-false' ? String.fromCharCode(97 + i) + ') (      )' : String.fromCharCode(97 + i) + ')'}</span>
                                <div class="flex flex-col gap-2">
                                    ${o.type === 'image' && o.image ? `<img src="${o.image}" class="max-h-32 object-contain self-start">` : `<span>${o.text}</span>`}
                                </div>
                            </div>
                            ${q.type === 'discursive-list' ? '<div class="border-b border-black w-full h-3 opacity-30 mt-2"></div>' : ''}
                        </div>`).join('')}</div>` : ''}
                    ${q.type === 'matching' ? `<div class="mt-6 space-y-6 ml-5 max-w-xl">${q.opcoes.map((o, i) => `
                        <div class="flex justify-between items-center gap-8">
                            <div class="flex items-center gap-4 flex-1">
                                <span class="font-bold shrink-0">${String.fromCharCode(97 + i)})</span>
                                <div class="flex-1 flex justify-center">${o.type === 'image' && o.image ? `<img src="${o.image}" class="w-20 h-20 object-contain p-1 border">` : `<span>${o.text}</span>`}</div>
                            </div>
                            <div class="flex items-center gap-4 flex-1"><div class="w-4 h-4 border-2 border-black rounded-full shrink-0"></div><span class="border-b border-dotted border-black flex-1 text-center pb-0.5">${o.matchText}</span></div>
                        </div>`).join('')}</div>` : ''}
                </div>`;
            });
            html += `</div></div>`;
            printView.innerHTML = html;
            window.print();
        }

        // Helpers de funções auxiliares (addOption, updateLines, etc)
        function addOption(qId) {
            const q = questions.find(qu => qu.id === qId);
            q.opcoes.push({ id: Date.now(), text: '', image: null, matchText: '', type: 'text' });
            renderQuestions();
        }
        function updateLines(qId, val) { questions.find(qu => qu.id === qId).linhas = parseInt(val); }
        function updateImageWidth(qId, val) { questions.find(qu => qu.id === qId).imageWidth = parseInt(val); renderQuestions(); }
        function setOptType(qId, oId, type) { questions.find(qu => qu.id === qId).opcoes.find(o => o.id.toString() === oId.toString()).type = type; renderQuestions(); }
        function updateOptText(qId, oId, val) { questions.find(qu => qu.id === qId).opcoes.find(o => o.id.toString() === oId.toString()).text = val; }
        function updateOptMatch(qId, oId, val) { questions.find(qu => qu.id === qId).opcoes.find(o => o.id.toString() === oId.toString()).matchText = val; }
        function removeOption(qId, oId) {
            const q = questions.find(qu => qu.id === qId);
            q.opcoes = q.opcoes.filter(o => o.id.toString() !== oId.toString());
            renderQuestions();
        }
    </script>
